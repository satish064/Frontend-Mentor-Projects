<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="flex-container">
        <div class="blue-card card">
            <h4 class="result">Your Result</h4>
            <div class="circle">
                <h1 class="number">76</h1> <span>of 100</span>
            </div>
            <h4 class="great">Great</h4>
            <p>You scored higher than 65% of the people who have taken these tests.</p>
        </div>
        <div class="white-card card">
            <h3 class="summary">Summary</h3>
            <div class="number-container">
                <div class="reaction common-container">
                    <div class="left">
                        <img src="./results-summary-component-main/assets/images/icon-reaction.svg" alt="reaction-icon">
                        <h5>Reaction</h5>
                    </div>
                    <div class="right">
                        <p class="result-number">80 <span class="out-of">/ 100</span></p>
                    </div>
                </div>
                <div class="memory common-container">
                    <div class="left">
                        <img src="./results-summary-component-main/assets/images/icon-memory.svg" alt="memory-icon">
                        <h5>Memory</h5>
                    </div>
                    <div class="right">
                        <p class="result-number">92 <span class="out-of">/ 100</span></p>
                    </div>
                </div>
                <div class="verbal common-container">
                    <div class="left">
                        <img src="./results-summary-component-main/assets/images/icon-verbal.svg" alt="verbal-icon">
                        <h5>Verbal</h5>
                    </div>
                    <div class="right">
                        <p class="result-number">61 <span class="out-of">/ 100</span></p>
                    </div>
                </div>
                <div class="visual common-container">
                    <div class="left">
                        <img src="./results-summary-component-main/assets/images/icon-visual.svg" alt="visual-icon">
                        <h5>Visual</h5>
                    </div>
                    <div class="right">
                        <p class="result-number">73 <span class="out-of">/ 100</span></p>
                    </div>
                </div>
            </div>
            <button class="btn">Continue</button>
        </div>
    </main>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | NFT preview card component</title>
  <link rel="stylesheet" href="style.css">
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }

    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');
  </style>
</head>

<body>
  <div class="card-container">
    <div class="img-container">
      <img src="nft-preview-card-component-main/images/image-equilibrium.jpg" alt="equilibrium">
    </div>
    <h1>Equilibrium #3429</h1>
    <p class="content">Our Equilibrium collection promotes balance and calm.</p>
    <div class="eth-container">
      <div class="eth-value">
        <img src="nft-preview-card-component-main/images/icon-ethereum.svg" alt="ethereum">
        <p>0.041 ETH</p>
      </div>
      <div class="later">
        <img src="nft-preview-card-component-main/images/icon-clock.svg" alt="clock">
        <p>3 days left</p>
      </div>
      
    </div>
    <div class="line"></div>
    <div class="footer">
        <img src="./nft-preview-card-component-main/images/image-avatar.png" alt="avatar">
        <p><span style="color: hsl(215, 51%, 70%);">Creation of</span> Jules Wyvern</p>
    </div>
  </div>
</body>

</html>
